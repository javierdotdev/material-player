<!DOCTYPE html>
<html lang="en" >

<head>
  <meta charset="UTF-8">
  <title>Material Design Player</title>
  
    <link rel="stylesheet" href="vendor/normalize/normalize.css">

  <link rel="stylesheet" href="vendor/font-awesome/css/font-awesome.min.css">

      <link rel="stylesheet" href="css/style.css">

  
</head>

<body>

  
<div class="player">
  <div class="cover"></div>
  <div class="info">
    <div class="menu-row">
      <div class="btn menu left"><i class="fa fa-bars"></i></div>
      <div class="btn options right"><i class="fa fa-ellipsis-v"></i></div>
      <div class="btn heart right"><i class="fa fa-heart"></i></div>
    </div>
    <div class="song">Feel So Close - Radio Edit</div>
    <div class="artist">Calvin Harris</div>
    <div class="time">3:26</div>
  </div>
  <div class="controls">
    <div class="playback">
      <div class="previous"><i class="fa fa-step-backward"></i></div>
      <button class="pause"><i class="fa fa-pause"></i></button>
      <div class="next"><i class="fa fa-step-forward"></i></div>
    </div>
    <div class="volume">
      <button class="vol-toggle" type="button" aria-label="Mute"><i class="fa fa-volume-up"></i></button>
      <div class="vol-bar">
        <div class="level"></div>
      </div>
    </div>
    <div class="ambient" role="button" tabindex="0" aria-label="Ambient light"><i class="fa fa-lightbulb-o"></i></div>
    <div class="shuffle"><i class="fa fa-random"></i></div>
  </div>
  <div class="track">
    <div class="complete"></div>
  </div>
  <div class="playlist-panel">
    <div class="pl-header">
      <span class="pl-heading">Queue</span>
      <button class="pl-close" type="button" aria-label="Close playlist">&times;</button>
    </div>
    <ul class="pl-list"></ul>
  </div>
  <div class="options-menu">
    <div class="options-title">Repeat</div>
    <ul class="options-list">
      <li data-repeat="off"><i class="fa fa-ban" aria-hidden="true"></i><span>Off</span></li>
      <li data-repeat="all"><i class="fa fa-repeat" aria-hidden="true"></i><span>All</span></li>
      <li data-repeat="one"><i class="fa fa-repeat" aria-hidden="true"></i><span>One</span></li>
    </ul>
  </div>
</div>
  <script src="js/index.js"></script>




</body>

</html>
